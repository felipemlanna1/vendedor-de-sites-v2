      - paragraph [ref=e410]: PSORÍASE
      - paragraph [ref=e411]: "Esta é uma das doenças mais frequentes na dermatologia. Geralmente se apresenta como lesões de pele vermelhas que descamam, podendo ter coceira associada. O diagnóstico, na maioria das vezes, é clínico, ou seja: com a avaliação de um médico dermatologista. Em alguns casos é necessário realizar biópsia para confirmar o diagnóstico. Hoje existem diversos tipos de tratamento disponiveis, desde medicaçoes para aplicar na pele até medicações em comprimido e injetáveis. E sim: é possível ficar sem lesões de pele. Mas é muito importante reforçar que o diagnóstico de psoríase deve ser feito por especialista, pois existem outras doenças de pele que podem imitar e confundir o diagnóstico."
    - generic [ref=e415]:
      - paragraph
      - paragraph
      - paragraph [ref=e416]: DERMATITE ATÓPICA
      - paragraph
      - paragraph [ref=e417]: Apesar de ser mais comum na infância, a dermatite atópica pode acometer paciente de todas as idades. Existem algumas localizações típicas, como a região anterior dos braços e a região posterior das pernas, mas qualquer área do corpo pode ser acometida. O grande achado desta doença é a coceira, que tende a ser intensa e pode trapalhar muito a qualidade de vida do paciente. O diagnóstico é clínico, feito pelo médico especialista (dermatologista ou alergista), mas alguns exames complementares podem ser necessários. Existem orientações gerais que são úteis em todos os casos, como cuidar com a duração e com a temperatura da água do banho além de hidratação adequada e diária da pele. Mas hoje temos várias opções de tratamento, com medicações tanto em comprimido quanto injetáveis, que auxiliam no controle da doença e na coceira!
    - generic [ref=e421]:
      - paragraph
      - paragraph
      - paragraph [ref=e422]: ACNE
      - paragraph [ref=e423]: "A maioria das pessoas tem quadro de acne durante a adolescência. Isso tem relação com as diversas alterações hormonais pelas quais o corpo humano passa na puberdade. Porém, apesar de comum, existem quadros que necessitam de tratamento específico. Infelzimente muitas pessoas demoram para procurar auxílio por considerar que o quadro é normal. O problema é que o mais difícil de tratar na acne não é a doença em si, mas as cicatrizes que ficam! Além disso, apesar de ser mais comum na adolescência, pode acontecer em diversas faixas etárias, inclsuive na vida adulta. E sim: a acne pode estar relacionada a outros problemas de saúde, como a síndrome dos ovários policísticos. Independente da causa e da gravidade, acne tem tratamento e este deve ser iniciado de maneira precoce!"
    - generic [ref=e427]:
      - paragraph
      - paragraph
      - paragraph [ref=e428]: HIDRADENITE SUPURATIVA
      - paragraph [ref=e429]: Infelizmente esta é uma doença que ainda recebe muitos diagnósticos incorretos até chegar ao diagnóstico certo. E o grande problema são as cicatrizes que a doença vai deixando, além dos quadros de inflamação de repetição, que prejudicam muito a qualidade de vida dos pacientes. É mais comum no sexo feminino (apesar de poder afetar qualquer sexo), que cursa com a formação de lesões que parecem furúnculos (principalmente nas axilas, virilha, mamas e região perianal). Após a melhora da lesão inflamatória, podem ficar cicatrizes. E o quadro tende a se repetir outras vezes (nas mesmas localizações e em novas localizações). O diagnóstico deve ser feito por especialista e o exame de ultrassonografia é muito útil para avaliar a extensão da doença e inclusive diagnosticar lesões que não conseguimos ver ao exame físico. E, assim como as outras doenças anteriormente citadas, a hidradenite supurativa tem tratamento! E é possível, sim, manter a doença controlada e melhorar a qualidade de vida dos pacientes!
      - paragraph
    - generic [ref=e433]:
      - paragraph
      - paragraph
      - paragraph [ref=e434]: LUPÚS ERITEMATOSO
      - paragraph [ref=e435]: O lupus é uma doença que pode acometer apenas a pele ou acometer a pele e outros órgãos e sistemas. Neste segundo caso, chamamos de lupus eritematoso sistêmico e o tratamento necessita ser feito com médico reumatologista. E mesmo quando apenas a pele é acometida, existe o risco de em algum momento a doença evoluir para um quadro sistêmico, por isso o acompanhamento com reumatologista é fundamental. Mas as lesões de pele também tem tratamento e o médico dermatologista com experiência em colagenoses pode contribuir na melhora do aspecto das lesões! Inclusive existem tratamentos estéticos que podem ser feitos, se a doença estiver controlada. Além de uma rotina de cuidados adequada, para melhorar o aspecto da pele.
    - generic [ref=e439]:
      - paragraph
      - paragraph
      - paragraph [ref=e440]: URTICÁRIA
      - paragraph [ref=e441]: A urticária é uma doença relativamente comum, mas que atrapalha (e muito) a qualidade de vida dos paciente. São lesões vermelhas com muita coceira, que aparecem em qualquer região do corpo e tendem a ir mudando de localização durante a crise. A lesão em si dura menos de 24 horas no mesmo local, mas outras lesões vão surgindo em locais diferentes, Existem as urticárias que chamamos de agudas, cujo quadro tem duração menor do que 6 semanas. Nestes casos, muitas vezes conseguimos descobrir o fator causal, como uma infecção ou uso de medicações. Porém, quando o quadro dura mais do que 6 semanas, estamos diante de uma urticária crônica, que numa parcela significativa dos pacientes não tem um agente causal específico identificado. Nestes casos, chamamos de urticária crônica espontânea. Mas, independente do tipo de urticária, hoje temos opções de tratamento eficazes, que permitem o controle da doença a longo prazo.
      - paragraph
    - generic [ref=e445]:
      - paragraph
      - paragraph
      - paragraph [ref=e446]: QUEDA DE CABELO
      - paragraph [ref=e447]: O nome científico é alopécia, quando acontece a queda e rarefação dos fios. Aqui é importante salientar que existem diversos tipos de alopécia, com diferentes causas e diferentes tratamentos. Há casos em que acontece uma inflamação em um local específico da raíz do fio, que leva a uma incapacidade do fio voltar a crescer (pois irá se formar uma cicatriz no local). São as alopécias cicatriciais, que necessitam de tratamento precoce justamente para evitar a perda dos fios. Porém, o mais comum são as alopécias não cicatriciais, ou seja, que não formam cicatrizes. A maioria destas não envovle processo inflamatório e o exemplo clássico é o eflúvio telógeno. Mas, independente do tipo de alopecia, o diagnóstico correto e tratamento eficaz são fundamentais!
    - generic [ref=e451]:
      - paragraph
      - paragraph [ref=e452]: Feridas e úlceras crônicas são lesões que não cicatrizam no tempo esperado, geralmente associadas a doenças de base como insuficiência venosa, diabetes ou problemas arteriais. Elas representam um desafio clínico, pois além da dor e do risco de infecção, impactam a qualidade de vida do paciente. O manejo adequado começa com o diagnóstico correto da causa, já que tratar apenas a ferida sem abordar o fator de base impede a cicatrização. A escolha dos curativos deve ser individualizada, respeitando as características da lesão (presença de exsudato, tecido com necrose, sinais de infecção, profundidade e localização). Outro ponto essencial é o acompanhamento regular pela equipe de enfermagem, que garante a avaliação contínua da evolução da ferida, troca correta dos curativos, prevenção de complicações e orientação ao paciente e familiares. Assim, o tratamento eficaz das úlceras crônicas exige integração entre diagnóstico clínico, escolha racional dos curativos e acompanhamento profissional especializado, visando não apenas a cicatrização, mas também a melhora global do bem-estar do paciente.
      - paragraph
      - paragraph [ref=e453]: FERIDAS CRÔNICAS
    - generic [ref=e457]:
      - paragraph
      - paragraph
      - paragraph [ref=e458]: ULTRASSONOGRAFIA
      - paragraph [ref=e459]: A ultrassonografia dermatológica é um exame de imagem não invasivo que utiliza altas frequências (geralmente acima de 15 MHz) para avaliar a pele com grande precisão. Permite identificar a espessura da epiderme e derme, presença de inflamação, tumores cutâneos, depósito de produtos (como preenchedores) e até acompanhar a evolução de tratamentos. É uma ferramenta cada vez mais utilizada na dermatologia moderna, pois auxilia no diagnóstico, no planejamento terapêutico e no seguimento de doenças inflamatórias (como a Hidradenite Supurativa) e tumorais (lipomas, câncer de pele, dentre outros), trazendo mais segurança e precisão para o cuidado do paciente. Além disso, é possível com este exame avaliar complicações de procedimentos estéticos (como nódulos e edema), realizar procedimentos guiados (como a aplicação de ácido hialurônico guiada em áreas de risco da face) e aplicação de hialuronidase guiada por ultrassonografia (para remoção de focos de Ácido Hialurônico)
