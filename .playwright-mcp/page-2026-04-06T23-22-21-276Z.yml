                  - paragraph [ref=e179]: Dermatologista formado no Hospital Universitário da Universidade Federal de Santa Catarina, com foco na dermatologia em doenças clínicas, cirúrgicas e oncológicas. Realizou estágio em Cirurgia Oncológica no Hospital Erasto Gaertner (Curitiba, PR – 2023) e é Fellow em Cirurgia Micrográfica de Mohs no Hospital Universitário da UFSC para oferecer um plano de acompanhamento completo ao paciente com Câncer de Pele.
                  - paragraph [ref=e180]:
                    - strong [ref=e181]: "Entre as áreas de atuação estão:"
                  - list [ref=e182]:
                    - listitem [ref=e183]: "Consultas clínicas em Dermatologia (adulto e infantil): tratamento e acompanhamento de acne, melasma, psoríase, dermatites, alergias, urticária, reações adversas a medicamentos, queloides e cicatrizes, micoses, hiperhidrose, vitiligo."
                    - listitem [ref=e184]: "Dermatologia Oncológica: Cirurgia de Câncer de Pele (Carcinoma Basocelular, Carcinoma Espinocelular, Melanoma entre outros tumores)"
                    - listitem [ref=e185]: "Dermatologia Cirúrgica: Biópsia de pele, Remoções de lesões benignas (cistos, lipomas, nevos (sinais), Correções cirúrgicas de cicatrizes, Lobuloplastia (Correção de lóbulo de orelha), Infiltrações dermatológicas"
                    - listitem [ref=e186]: Realização de procedimentos com peeling químicos, toxina botulínica, microagulhamento e dermoabrasão, crioterapia e criocirurgia (nitrogênio líquido)
