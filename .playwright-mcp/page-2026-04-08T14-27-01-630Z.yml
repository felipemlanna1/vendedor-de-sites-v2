                      - text: Trabalhar com dor não deveria ser parte da rotina.
                      - text: Mas, infelizmente, essa é a realidade de muitas pessoas que atendemos todos os dias. 🩺
                      - text: "Profissionais que passam horas em frente ao computador, trabalhadores da linha de frente que carregam peso, autônomos que não param um minuto... todos com uma coisa em comum: o corpo pedindo socorro."
                      - text: Dor no joelho ao subir escadas, coluna travada no fim do dia, estalos no ombro ao levantar o braço… 🦴
                      - text: São sinais que, muitas vezes, vão sendo ignorados, até se tornarem limitações sérias.
                      - text: "Hoje, no Dia do Trabalho, quero te lembrar: não é egoísmo parar para cuidar de você."
                      - text: Meu trabalho é cuidar do seu movimento, da sua mobilidade e da sua qualidade de vida. 💙
                      - text: Se a dor tem sido sua companheira de jornada, é hora de virar essa página.
                      - text: "📍Agende sua consulta e dê o primeiro passo para um novo ciclo: com menos dor, mais bem-estar e saúde para continuar fazendo o que você ama."
