                      - text: Uma restauração pode se tornar um tratamento de canal? 🤔
                      - text: Sim! Todo procedimento da restauração, mesmo seguindo todo cuidado necessário, é um trauma para a polpa e ela pode responder a esse processo.
                      - text: Ela tenta se proteger criando uma barreira de proteção, dentina reacional, no local com mais proximidade a essa restauração. Mas com o passar do tempo pode acontecer da polpa não suportar e iniciar uma morte celular.
                      - text: Esse processo pode demorar a acontecer ou pode ser rapidamente. Pode apresentar sintomas e pode ser silencioso. Por isso fazer o acompanhamento radiográfico e clínico após restaurações profundas é sempre muito importante.🦷🙌🏻
