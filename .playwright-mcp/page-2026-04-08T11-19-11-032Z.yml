                      - text: Bens da madrasta podem ser penhorados por dívida de pensão do pai!
                      - text: .
                      - text: .
                      - text: Em decisão recente, o Superior Tribunal de Justiça (STJ) entendeu que bens adquiridos em comunhão com o devedor de pensão alimentícia podem ser penhorados, mesmo que estejam em nome da atual companheira (a madrasta).
                      - text: .
                      - text: O que isso significa?
                      - text: Quando o pai (genitor) não paga a pensão alimentícia e vive em união estável ou casamento sob o regime de comunhão parcial de bens, o patrimônio adquirido durante essa convivência pode ser usado para quitar a dívida alimentar.
                      - text: .
                      - text: Ou seja, os bens da madrasta – se adquiridos após o início da união podem ser atingidos pela penhora, já que integram o patrimônio comum do casal.
                      - text: .
                      - text: Por que isso é importante?
                      - text: Essa decisão reforça a proteção ao direito fundamental à alimentação.
                      - text: .
                      - text: O STJ entendeu que a responsabilidade patrimonial do casal não pode ser usada como escudo para fraudes ou para impedir a efetiva satisfação da dívida alimentar.
                      - text: ⠀
                      - text: "Vale lembrar: a medida não atinge bens particulares da madrasta adquiridos antes da união, mas apenas aqueles considerados fruto do esforço comum durante a relação."
                      - text: ⠀
                      - text: Fique atento! Se você está enfrentando questões relacionadas a pensão alimentícia ou partilha de bens, procure orientação jurídica especializada.
