            - generic [ref=e284]:
              - generic [ref=e285]:
                - link "Existe uma parte da história do seu filho que ele não será capaz de lembrar, mas que poderá reviver através das suas mãos. Um álbum de gestante não guarda apenas a espera, ele guarda o primeiro capítulo de um amor que só cresce. É o peso do papel e a textura das fotos que permitem que, daqui a vinte anos, ele entenda como foi amado desde o início. A fotografia completa o ciclo da memória e transforma o que é passageiro em herança eterna. Qual capítulo da história da sua família você sente que precisa tirar da tela do celular hoje? Clipe" [ref=e287] [cursor=pointer]:
                  - /url: /marlonteixeirafotografia/reel/DV0kw92pyb4/
                  - img "Existe uma parte da história do seu filho que ele não será capaz de lembrar, mas que poderá reviver através das suas mãos. Um álbum de gestante não guarda apenas a espera, ele guarda o primeiro capítulo de um amor que só cresce. É o peso do papel e a textura das fotos que permitem que, daqui a vinte anos, ele entenda como foi amado desde o início. A fotografia completa o ciclo da memória e transforma o que é passageiro em herança eterna. Qual capítulo da história da sua família você sente que precisa tirar da tela do celular hoje?" [ref=e290]
                  - generic:
                    - generic:
                      - generic:
                        - img "Clipe"
                - link "Muitas vezes o desejo de guardar uma fase dos filhos esbarra em pequenas inseguranças do dia a dia. Seja a dúvida sobre o que vestir ou a incerteza sobre o comportamento dos pequenos, saiba que este Especial foi pensado para acolher a realidade de cada família. O objetivo é criar um ambiente leve onde a única regra é o afeto. Qual dessas dúvidas mais passa pela sua cabeça quando você pensa em fazer um ensaio? Me conte aqui nos comentários. Carrossel" [ref=e293] [cursor=pointer]:
                  - /url: /marlonteixeirafotografia/p/DVuIIKPFRLz/
                  - img "Muitas vezes o desejo de guardar uma fase dos filhos esbarra em pequenas inseguranças do dia a dia. Seja a dúvida sobre o que vestir ou a incerteza sobre o comportamento dos pequenos, saiba que este Especial foi pensado para acolher a realidade de cada família. O objetivo é criar um ambiente leve onde a única regra é o afeto. Qual dessas dúvidas mais passa pela sua cabeça quando você pensa em fazer um ensaio? Me conte aqui nos comentários." [ref=e296]
                  - generic:
                    - generic:
                      - generic:
                        - img "Carrossel"
                - link "O tempo tem pressa, mas a memória não precisa ter. Entre a rotina dos dias e o crescimento inevitável dos filhos, as pausas para sentir a verdade de um abraço tornam-se joias raras. Por isso, este Especial de Mães foi desenhado sob um olhar minimalista para que nada distraia a conexão genuína de vocês. Você sente que este é o momento de pausar e guardar o agora para sempre? Me conte aqui nos comentários. Carrossel" [ref=e299] [cursor=pointer]:
                  - /url: /marlonteixeirafotografia/p/DVf-WIylZoI/
