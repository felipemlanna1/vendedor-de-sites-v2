                      - generic:
                        - img "Carrossel"
                - link "Para que a pressa do tempo nunca apague o que o seu coração guarda. Estão oficialmente abertas as vagas para o nosso Especial de Mães 2026. Uma experiência desenhada no minimalismo para que nada distraia o olhar do que realmente importa, a sua conexão. O amor não precisa de filtro, mas merece ser eterno. Vagas limitadas para o nosso Especial de Mães. Comente 'AMOR' se você deseja transformar seu afeto em herança viva. Clipe" [ref=e318] [cursor=pointer]:
