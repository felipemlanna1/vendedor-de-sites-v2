                                  - heading [level=1] [ref=e1286]:
                                    - text: Os tratamentos com Ultrassom Microfocado, são bem vindos aos pacientes que desejam um gerenciamento facial com abordagem mais conservadora.
                                    - text: Através de um planejamento individualizado, é possível valorizar traços da beleza natural de cada paciente.
                                    - text: Sempre teremos um pós operatório inicial, porém os resultados começam a ser tornar mais efetivos 30 dias após a aplicação. E assim vão se apresentando entre 60 a 90 dias, que é o tempo necessário para a formação de uma rede de colágeno e elastina organizada, proporcionando firmeza e sustentação.
                                    - text: Através deste planejamento, é possível tratar flacidez, melhorar o contorno facial, promover Lifting facial, tratar áreas como papada e pescoço, melhorar a abertura do olhar, entre outros benefícios.
                                    - text: "Mas atenção: os resultados são individuais, dependem do planejamento que inclui número de disparos, quantidade de camadas tratadas, saúde e hábitos do paciente."
                                    - text: Um adequado acompanhamento profissional faz toda diferença em seu resultado final.
                                    - text: Te aguardo para uma consulta comigo!
